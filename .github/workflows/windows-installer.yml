name: Build Windows Installer

# Trigger on pushes to main (or manually via workflow_dispatch)
on:
  push:
    branches:
      - main
  workflow_dispatch:
    

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build application with PyInstaller
        run: |
          pyinstaller \
            --name moneymirror \
            --onedir \
            --windowed \
            --add-data "src/moneymirror/resources;resources" \
            src/moneymirror/main.py

      - name: Install NSIS
        run: choco install nsis -y

      - name: Compile NSIS installer
        run: |
          makensis.exe -V2 scripts/installer.nsi

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MoneyMirror-Windows-Installer
          path: |
            "${{ github.workspace }}\MoneyMirror-Setup-*.exe"
