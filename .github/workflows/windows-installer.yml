name: Build Windows Installer

# Trigger on pushes to debian (or manually via workflow_dispatch)
on:
  push:
    branches:
      - debian
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build application with PyInstaller
        shell: bash
        run: |
          pyinstaller dimeview.spec

      - name: Verify Dist Content
        shell: bash
        run: |
          ls -R dist/dimeview

      - name: Install NSIS
        run: |
          choco install nsis -y
          # Add NSIS to PATH for the next step
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile NSIS installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\NSIS\makensis.exe' -V2 scripts/installer.nsi

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DimeView-Windows-Installer
          path: |
            dist\DimeView-Setup-*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/DimeView-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
