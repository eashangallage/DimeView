name: Build & Package Windows

on:
  push:
    branches: [ "debian" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv venv
          # Correctly call pip from within the venv to install your project and PyInstaller
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\pip.exe install .
          .\venv\Scripts\pip.exe install pyinstaller

      - name: Run PyInstaller
        # Correctly call PyInstaller from within the venv using your .spec file
        run: .\venv\Scripts\pyinstaller.exe moneymirror.spec
        
      - name: Create NSIS Installer
        # This single action installs and runs NSIS for you
        uses: joncloud/makensis-action@v4
        with:
          # Make sure this path points to your NSIS script
          script-file: scripts/installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-moneymirror
          # This correctly uploads both the final installer and the raw build output
          path: |
            dist/moneymirror/
            output/MoneyMirror-Setup.exe